server:
  port: ${SERVER_PORT:8093}

# Azure Blob Storage Configuration
external:
  azure-blob-storage:
    base-url: ${AZURE_BLOB_STORAGE_URL}
    connection-string: ${AZURE_STORAGE_CONNECTION_STRING}
    timeout:
      connect: 5000
      read: 30000

# Sentry Performance Monitoring
sentry:
  traces-sample-rate: 0.2

# RabbitMQ Configuration
spring:
  rabbitmq:
    host: trainapp1.local
    port: 5672
    username: guest
    password: ENC(TODO_ENCRYPT_WITH_JASYPT)
    virtual-host: /
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER_URI:https://login.microsoftonline.com/a7048452-8647-45be-a810-e2f665115655/v2.0}
          audiences: ${OAUTH2_AUDIENCE:a3704500-c79d-43b4-a2bd-30b1437e819a}

# Logging Configuration
logging:
  level:
    root: INFO
    "[za.co.api]": INFO
    "[org.springframework.amqp]": WARN
    "[org.springframework.rabbit]": WARN
    "[org.springframework.security]": WARN
    "[org.springframework.security.oauth2]": WARN

# Download Link Configuration
download:
  hmac-secret: ${DOWNLOAD_HMAC_SECRET}
  base-url: ${DOWNLOAD_BASE_URL}
