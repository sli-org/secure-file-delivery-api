# ==============================================================================
# Secure File Delivery API - Main Configuration
# ==============================================================================
spring:
  application:
    name: secure-file-delivery-api
  profiles:
    active: docker

# Default configuration (used when no profile is active)
---
spring:
  config:
    activate:
      on-profile: default
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

server:
  port: 8080

logging:
  level:
    root: INFO
    "[za.co.api]": DEBUG
    "[org.springframework.amqp]": WARN
    "[org.springframework.rabbit]": WARN
    "[org.springframework.security]": DEBUG
    "[org.springframework.security.oauth2]": DEBUG

# RabbitMQ Events Configuration
events:
  exchange-name: ${EVENTS_EXCHANGE_NAME:statement.events.exchange}
  queue-name: ${EVENTS_QUEUE_NAME:statement.events.queue}
  routing-key: ${EVENTS_ROUTING_KEY:statement.event}

external:
  azure-blob-storage:
    base-url: ${AZURE_BLOB_STORAGE_URL}
    connection-string: ${AZURE_STORAGE_CONNECTION_STRING}
