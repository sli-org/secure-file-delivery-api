# statement-api - Main Configuration
# Global configuration for the Statement API

spring:
  application:
    name: statement-api
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB
  output:
    ansi:
      enabled: always

# Event-driven architecture configuration
events:
  exchange-name: statement_event_exchange
  routing-key:
    statement-uploaded: action.statement.uploaded
    download-link-created: action.downloadlink.created
    statement-deleted: action.statement.deleted

# OpenAPI documentation and Swagger UI
springdoc:
  swagger-ui:
    enabled: true
  default-produces-media-type: application/json
  default-consumes-media-type: application/json
  show-actuator: false
  paths-to-exclude:
    - /actuator/**
  override-with-generic-response: false
  remove-broken-reference-definitions: false
  writer-with-order-by-keys: true
  pre-loading-enabled: true

# Sentry Error Tracking
sentry:
  dsn: "" # TODO: Add Sentry DSN
  send-default-pii: true
  exception-resolver-order: 1
  environment: ${spring.profiles.active:default}
  release: ${spring.application.name}@${build.version:unknown}
  traces-sample-rate: 0.0
