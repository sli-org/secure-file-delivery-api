# =============================================================================
# Docker Compose Profile — PostgreSQL + RabbitMQ + Azurite
# =============================================================================
server:
  port: ${SERVER_PORT:8093}

# Azure Blob Storage (Azurite emulator)
external:
  azure-blob-storage:
    base-url: ${AZURE_BLOB_STORAGE_URL}
    connection-string: ${AZURE_STORAGE_CONNECTION_STRING}
    timeout:
      connect: 5000
      read: 30000

spring:
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:rabbitmq}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:rabbitmq_user}
    password: ${SPRING_RABBITMQ_PASSWORD:rabbitmq_secret_2026}
    virtual-host: /
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/statementdb}
    username: ${SPRING_DATASOURCE_USERNAME:statement_user}
    password: ${SPRING_DATASOURCE_PASSWORD:statement_secret_2026}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      # Flyway owns the schema — Hibernate must NOT modify it
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER_URI}
          jwk-set-uri: ${OAUTH2_JWK_SET_URI}
          audiences: ${OAUTH2_AUDIENCE}
          connect-timeout: 5000
          read-timeout: 5000

# Download Link Configuration
download:
  hmac-secret: ${DOWNLOAD_HMAC_SECRET:docker-compose-hmac-secret-key-min-32-chars-long!!}
  base-url: ${DOWNLOAD_BASE_URL:http://localhost:8093/api/v1/statements/download}

# RabbitMQ Events Configuration
events:
  exchange-name: ${EVENTS_EXCHANGE_NAME:statement.events.exchange}
  queue-name: ${EVENTS_QUEUE_NAME:statement.events.queue}
  routing-key: ${EVENTS_ROUTING_KEY:statement.event}
  statement-uploaded: ${EVENTS_ROUTING_KEY_STATEMENT_UPLOADED:statement.uploaded}
  statement-deleted: ${EVENTS_ROUTING_KEY_STATEMENT_DELETED:statement.deleted}
  statement-downloaded: ${EVENTS_ROUTING_KEY_STATEMENT_DOWNLOADED:statement.downloaded}
  download-link-created: ${EVENTS_ROUTING_KEY_DOWNLOAD_LINK_CREATED:download-link.created}
  download-link-expired: ${EVENTS_ROUTING_KEY_DOWNLOAD_LINK_EXPIRED:download-link.expired}
  download-link-revoked: ${EVENTS_ROUTING_KEY_DOWNLOAD_LINK_REVOKED:download-link.revoked}
  file-processed: ${EVENTS_ROUTING_KEY_FILE_PROCESSED:file.processed}
  file-failed: ${EVENTS_ROUTING_KEY_FILE_FAILED:file.failed}
  
# Logging
logging:
  level:
    root: INFO
    "[za.co.api]": DEBUG
    "[org.springframework.amqp]": WARN
    "[org.springframework.security]": WARN

# Sentry Configuration (disabled for local development)
sentry:
  enabled: ${SENTRY_ENABLED:false}
  dsn: ${SENTRY_DSN:http://dummy@localhost:9000/1}
