server:
  port: ${SERVER_PORT:8093}

# Azure Blob Storage Configuration
external:
  azure-blob-storage:
    base-url: ${AZURE_BLOB_STORAGE_URL:http://localhost:10000/devstoreaccount1}
    connection-string: ${AZURE_STORAGE_CONNECTION_STRING}
    timeout:
      connect: 5000
      read: 30000

# RabbitMQ Configuration
spring:
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
  datasource:
    url: jdbc:h2:mem:statementdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER_URI:https://login.microsoftonline.com/a7048452-8647-45be-a810-e2f665115655/v2.0}
          audiences: ${OAUTH2_AUDIENCE:a3704500-c79d-43b4-a2bd-30b1437e819a}

# Download Link Configuration
download:
  hmac-secret: ${DOWNLOAD_HMAC_SECRET:local-dev-secret-key-min-32-characters-long}
  base-url: ${DOWNLOAD_BASE_URL:http://localhost:8093/api/v1/statements/download}

# Logging Configuration
logging:
  level:
    root: INFO
    "[za.co.api]": DEBUG
    "[org.springframework.amqp]": WARN
    "[org.springframework.rabbit]": WARN
    "[org.springframework.security]": WARN
    "[org.springframework.security.oauth2]": WARN
