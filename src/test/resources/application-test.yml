spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
  
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://test-issuer
          audiences: test-audience

# Flat RabbitMQ properties (no nesting)
events.exchange-name: test-exchange
events.queue-name: test-queue
events.routing-key: test.routing.key
events.routing-key.statement-uploaded: test.statement.uploaded
events.routing-key.statement-deleted: test.statement.deleted
events.routing-key.statement-downloaded: test.statement.downloaded

external.azure-blob-storage.base-url: http://localhost:10000/devstoreaccount1
external.azure-blob-storage.container-name: test-container
external.azure-blob-storage.connection-string: DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://localhost:10000/devstoreaccount1;

