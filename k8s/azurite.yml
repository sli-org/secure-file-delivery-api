# =============================================================================
# Azurite — Azure Blob Storage Emulator
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: azurite
  namespace: statement-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: azurite
  template:
    metadata:
      labels:
        app: azurite
    spec:
      containers:
        - name: azurite
          image: mcr.microsoft.com/azure-storage/azurite:latest
          command: ["azurite-blob", "--blobHost", "0.0.0.0", "--blobPort", "10000"]
          ports:
            - containerPort: 10000
---
apiVersion: v1
kind: Service
metadata:
  name: azurite-service
  namespace: statement-api
spec:
  selector:
    app: azurite
  ports:
    - port: 10000
      targetPort: 10000
